name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: speech-to-text
  TAG: ${{ github.sha }}

jobs:
  test-packages:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests for packages
      run: |
        for pkg in packages/*; do
          if [ -d "$pkg" ]; then
            echo "🧪 Running unit tests for $pkg..."
            cd $pkg
            go test -v -race ./... || true
            cd ../..
          fi
        done

  test-apps:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [api-server, stt-worker, llm-worker, outbox-relay, infra-migration]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests for ${{ matrix.service }}
      run: |
        echo "🧪 Running unit tests for ${{ matrix.service }}..."
        cd apps/${{ matrix.service }}
        go test -v -race ./... || true  # 允許測試失敗，繼續其他服務

  build:
    needs: [test-packages, test-apps]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    strategy:
      matrix:
        service: [api-server, stt-worker, llm-worker, outbox-relay, infra-migration]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.service }}
        tags: |
            type=ref,event=branch
            type=sha,prefix=

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/${{ matrix.service }}/Dockerfile
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
