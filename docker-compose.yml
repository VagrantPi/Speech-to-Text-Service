services:
  # ==========================================
  # Migration (run once after infra is ready)
  # ==========================================
  infra-migration:
    image: speech-to-text-infra-migration:latest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: speech_db
      DB_SSLMODE: disable
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_HOST: redis:6379
      AWS_ENDPOINT: http://minio:9000
    networks:
      - speech-network

  # ==========================================
  # Microservices
  # ==========================================
  api-server:
    image: speech-to-text-api-server:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      infra-migration:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: speech_db
      DB_SSLMODE: disable
      REDIS_HOST: redis:6379
      MINIO_ENDPOINT: http://minio:9000
      AWS_ENDPOINT: http://minio:9000
      AWS_PUBLIC_ENDPOINT: http://localhost:9000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY: minioadmin
      AWS_SECRET_KEY: minioadmin
      AWS_S3_BUCKET: uploads
      EXPIRATION_IN_MINUTES: "15"
    networks:
      - speech-network

  stt-worker:
    image: speech-to-text-stt-worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      infra-migration:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: speech_db
      DB_SSLMODE: disable
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_HOST: redis:6379
      AWS_ENDPOINT: http://minio:9000
    networks:
      - speech-network

  llm-worker:
    image: speech-to-text-llm-worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      infra-migration:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: speech_db
      DB_SSLMODE: disable
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_HOST: redis:6379
      AWS_ENDPOINT: http://minio:9000
    networks:
      - speech-network

  outbox-relay:
    image: speech-to-text-outbox-relay:latest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      infra-migration:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: speech_db
      DB_SSLMODE: disable
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - speech-network

  web:
    image: speech-to-text-web:latest
    ports:
      - "8081:80"
    volumes:
      - ./apps/web:/usr/share/nginx/html
    depends_on:
      - api-server
    networks:
      - speech-network

networks:
  speech-network:
    driver: bridge
